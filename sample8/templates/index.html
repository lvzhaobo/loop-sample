<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄时钟-LOOP</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">番茄时钟</h1>
        <div class="loop-label">Loop-20260721</div>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="phase-label" id="phaseLabel">工作时段</div>
        <div class="controls">
            <button class="btn btn-start" id="startBtn">开始</button>
            <button class="btn btn-pause" id="pauseBtn" disabled>暂停</button>
            <button class="btn btn-reset" id="resetBtn">重置</button>
        </div>
        <div class="status" id="status">就绪</div>
    </div>
    <script src="/static/js/pomodoro.js"></script>
</body>
</html>
