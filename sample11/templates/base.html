<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序算法可视化</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>排序算法可视化展示</h1>
        <p class="footer-text">Loop-20260723</p>
    </header>
    <main>

        <div class="error-page">
            <h2>404 - {{ error }}</h2>
            <p>您访问的页面不存在。</p>
            <a href="/">返回首页</a>
        </div>
        {% else %}
        {% block content %}{% endblock %}
        {% endif %}
    </main>
    <footer>
        <p>Loop-20260723</p>
    </footer>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
